# nginx config for The Gaskins — served under /tg subpath
# Astro builds with base: '/tg', so all asset references in HTML point to
# /tg/_astro/... and all internal links point to /tg/vault, /tg/war-room, etc.
# nginx strips the /tg prefix and serves the compiled static files from root.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # Main subpath — strip /tg prefix and serve from root
    location /tg/ {
        # Internal rewrite: /tg/vault → /vault, /tg/_astro/x.js → /_astro/x.js
        rewrite ^/tg(/.*)$ $1 break;
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Redirect bare /tg → /tg/ (so relative links resolve correctly)
    location = /tg {
        return 301 /tg/;
    }

    # Cache Astro hashed assets aggressively (immutable)
    location /tg/_astro/ {
        rewrite ^/tg(/.*)$ $1 break;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
        root /usr/share/nginx/html;
    }
}
