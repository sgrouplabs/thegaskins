# nginx config for The Gaskins static site
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # Cache static Astro assets aggressively (hashed filenames)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Clean URL fallback: try the file, then the .html variant, then 404
    location / {
        try_files $uri $uri/index.html $uri.html /404.html;
    }

    # Custom 404 — Astro generates a 404 page if present, else default
    error_page 404 /404.html;
}
